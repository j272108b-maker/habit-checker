<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>習慣チェッカー</title>
<style>
:root {
  --bg: #050b18;
  --panel: rgba(9, 24, 48, 0.88);
  --panel-strong: rgba(13, 34, 66, 0.95);
  --line: rgba(73, 190, 255, 0.38);
  --line-strong: #49c8ff;
  --text: #eaf7ff;
  --muted: #8aa9bf;
  --ok: #48f2a5;
  --warn: #ffd166;
}

* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 20% 0%, rgba(38, 146, 255, 0.35), transparent 34%),
    radial-gradient(circle at 88% 18%, rgba(59, 225, 255, 0.16), transparent 30%),
    linear-gradient(145deg, #040814 0%, #081b39 48%, #07111f 100%);
  display: flex;
  justify-content: center;
  padding: 22px 10px;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(73, 200, 255, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(73, 200, 255, 0.05) 1px, transparent 1px);
  background-size: 28px 28px;
  mask-image: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent 80%);
}

.app {
  position: relative;
  width: 100%;
  max-width: 520px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(12, 32, 62, 0.94), rgba(5, 13, 27, 0.94));
  box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42), 0 0 42px rgba(60, 190, 255, 0.18);
  padding: 20px;
  overflow: hidden;
}

.app::before,
.app::after {
  content: "";
  position: absolute;
  width: 74px;
  height: 74px;
  border-color: var(--line-strong);
  opacity: 0.48;
  pointer-events: none;
}

.app::before {
  top: 10px;
  left: 10px;
  border-top: 2px solid;
  border-left: 2px solid;
}

.app::after {
  right: 10px;
  bottom: 10px;
  border-right: 2px solid;
  border-bottom: 2px solid;
}

.hud-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 18px;
}

.eyebrow {
  color: var(--line-strong);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0;
}

h1 {
  margin: 5px 0 4px;
  font-size: 26px;
  line-height: 1.15;
}

.subtitle {
  color: var(--muted);
  font-size: 13px;
}

.status-chip {
  flex: 0 0 auto;
  min-width: 76px;
  border: 1px solid rgba(72, 242, 165, 0.48);
  border-radius: 8px;
  padding: 8px 10px;
  color: var(--ok);
  background: rgba(72, 242, 165, 0.08);
  text-align: center;
  font-size: 11px;
  font-weight: 800;
}

.progress-wrap {
  position: relative;
  padding: 12px;
  border: 1px solid rgba(73, 200, 255, 0.26);
  border-radius: 10px;
  background: rgba(1, 9, 22, 0.45);
  margin-bottom: 14px;
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

.progress {
  height: 10px;
  border-radius: 999px;
  background: rgba(93, 135, 170, 0.22);
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  border-radius: inherit;
  background: linear-gradient(90deg, #2f7dff, #49c8ff, #48f2a5);
  box-shadow: 0 0 18px rgba(73, 200, 255, 0.6);
  transition: width 0.3s;
}

.today-status {
  min-height: 20px;
  margin: 10px 0 0;
  color: var(--ok);
  font-size: 13px;
  font-weight: 800;
}

.input-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  margin: 16px 0;
}

input[type="text"] {
  min-width: 0;
  padding: 13px 14px;
  border-radius: 8px;
  border: 1px solid rgba(73, 200, 255, 0.3);
  background: rgba(2, 11, 26, 0.74);
  color: var(--text);
  font-size: 15px;
  outline: none;
}

input[type="text"]::placeholder {
  color: #69879e;
}

input[type="text"]:focus {
  border-color: var(--line-strong);
  box-shadow: 0 0 0 3px rgba(73, 200, 255, 0.12);
}

button {
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font: inherit;
}

.add-btn,
.month-nav button {
  border: 1px solid rgba(73, 200, 255, 0.5);
  background: linear-gradient(180deg, rgba(40, 123, 255, 0.95), rgba(16, 67, 150, 0.95));
  color: white;
  font-weight: 800;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 0 18px rgba(31, 140, 255, 0.2);
}

.add-btn {
  padding: 0 18px;
}

ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

.item {
  position: relative;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 12px;
  min-height: 56px;
  padding: 12px 12px;
  border: 1px solid rgba(73, 200, 255, 0.22);
  border-radius: 10px;
  margin-bottom: 10px;
  background: rgba(10, 27, 54, 0.72);
}

.item.checked {
  border-color: rgba(72, 242, 165, 0.4);
  background: rgba(22, 64, 66, 0.72);
}

.item input {
  width: 18px;
  height: 18px;
  accent-color: var(--ok);
}

.item span {
  min-width: 0;
  color: #f3fbff;
  font-size: 15px;
  font-weight: 700;
  overflow-wrap: anywhere;
}

.delete {
  width: 34px;
  height: 34px;
  color: #83a4b8;
  background: rgba(255,255,255,0.03);
  font-size: 16px;
}

.item-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}

.timer-open {
  min-width: 68px;
  height: 34px;
  padding: 0 10px;
  border: 1px solid rgba(73, 200, 255, 0.48);
  color: var(--line-strong);
  background: rgba(73, 200, 255, 0.08);
  font-size: 11px;
  font-weight: 900;
}

.meditation-timer {
  display: none;
  margin-top: 14px;
  padding: 14px;
  border: 1px solid rgba(73, 200, 255, 0.3);
  border-radius: 12px;
  background: rgba(1, 9, 22, 0.52);
}

.meditation-timer.active {
  display: block;
}

.timer-head {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}

.timer-title {
  color: #dff6ff;
  font-size: 15px;
  font-weight: 900;
}

.timer-target {
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
}

.timer-close {
  width: 34px;
  height: 34px;
  color: #83a4b8;
  background: rgba(255,255,255,0.03);
  font-size: 16px;
}

.timer-display {
  margin: 12px 0;
  padding: 16px 12px;
  border: 1px solid rgba(72, 242, 165, 0.24);
  border-radius: 10px;
  background: rgba(72, 242, 165, 0.06);
  color: var(--ok);
  text-align: center;
  font-size: 38px;
  font-weight: 900;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.timer-settings,
.timer-actions {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}

.timer-settings {
  grid-template-columns: repeat(3, minmax(0, 1fr)) 76px;
  margin-bottom: 10px;
}

.preset-btn,
.timer-action {
  min-height: 38px;
  border: 1px solid rgba(73, 200, 255, 0.36);
  color: var(--text);
  background: rgba(73, 200, 255, 0.08);
  font-size: 12px;
  font-weight: 800;
}

.timer-action.primary {
  border-color: rgba(72, 242, 165, 0.52);
  color: #052016;
  background: linear-gradient(180deg, rgba(72, 242, 165, 0.95), rgba(34, 185, 124, 0.95));
}

.minute-input {
  width: 100%;
  min-width: 0;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid rgba(73, 200, 255, 0.3);
  background: rgba(2, 11, 26, 0.74);
  color: var(--text);
  font-size: 13px;
  text-align: center;
  outline: none;
}

.calendar {
  margin-top: 20px;
  padding: 14px;
  border: 1px solid rgba(73, 200, 255, 0.28);
  border-radius: 12px;
  background: rgba(1, 9, 22, 0.42);
}

.calendar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}

.calendar-title {
  color: #dff6ff;
  font-size: 16px;
  font-weight: 900;
}

.month-nav {
  display: flex;
  gap: 6px;
}

.month-nav button {
  width: 34px;
  height: 34px;
  padding: 0;
  font-size: 19px;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 6px;
}

.weekday {
  color: var(--line-strong);
  font-size: 11px;
  font-weight: 900;
  text-align: center;
}

.day {
  position: relative;
  display: grid;
  place-items: center;
  aspect-ratio: 1;
  border: 1px solid rgba(73, 200, 255, 0.16);
  border-radius: 7px;
  background: rgba(12, 28, 53, 0.72);
  color: #b9d3e5;
  font-size: 13px;
  font-weight: 800;
}

.day.empty {
  border-color: transparent;
  background: transparent;
}

.day.today {
  border-color: var(--line-strong);
  color: #fff;
  box-shadow: 0 0 14px rgba(73, 200, 255, 0.24);
}

.day.completed {
  border-color: rgba(72, 242, 165, 0.7);
  background: linear-gradient(180deg, rgba(72, 242, 165, 0.28), rgba(33, 104, 94, 0.7));
  color: white;
}

.day.completed::after {
  content: "✓";
  position: absolute;
  right: 4px;
  bottom: 2px;
  color: var(--ok);
  font-size: 12px;
  line-height: 1;
}

.calendar-note,
.footer {
  margin-top: 12px;
  color: var(--muted);
  font-size: 12px;
  text-align: center;
}

.footer {
  color: #66859a;
}

@media (max-width: 380px) {
  body {
    padding: 12px 8px;
  }

  .app {
    padding: 16px;
  }

  h1 {
    font-size: 23px;
  }

  .input-row {
    grid-template-columns: 1fr;
  }

  .timer-settings,
  .timer-actions {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .minute-input {
    min-height: 38px;
  }

  .add-btn {
    min-height: 44px;
  }
}
</style>
</head>
<body>
<div class="app">
  <div class="hud-top">
    <div>
      <div class="eyebrow">DAILY ROUTINE HUD</div>
      <h1>習慣チェッカー</h1>
      <div class="subtitle">静かに整える、今日の行動ログ</div>
    </div>
    <div class="status-chip">ONLINE</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>MISSION PROGRESS</span>
      <span id="progressText">0%</span>
    </div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="today-status" id="todayStatus"></div>
  </div>

  <div class="input-row">
    <input id="newItem" type="text" placeholder="習慣を追加">
    <button class="add-btn" onclick="addItem()">追加</button>
  </div>

  <ul id="list"></ul>

  <section class="meditation-timer" id="meditationTimer" aria-label="瞑想タイマー">
    <div class="timer-head">
      <div>
        <div class="eyebrow">MEDITATION TIMER</div>
        <div class="timer-title">瞑想タイマー</div>
        <div class="timer-target" id="timerTarget">瞑想</div>
      </div>
      <button class="timer-close" type="button" onclick="closeMeditationTimer()" aria-label="閉じる">✕</button>
    </div>
    <div class="timer-settings">
      <button class="preset-btn" type="button" onclick="setTimerMinutes(3)">3分</button>
      <button class="preset-btn" type="button" onclick="setTimerMinutes(5)">5分</button>
      <button class="preset-btn" type="button" onclick="setTimerMinutes(10)">10分</button>
      <input class="minute-input" id="timerMinutes" type="number" min="1" max="120" value="5" aria-label="瞑想時間（分）">
    </div>
    <div class="timer-display" id="timerDisplay">05:00</div>
    <div class="timer-actions">
      <button class="timer-action primary" type="button" onclick="startMeditationTimer()">開始</button>
      <button class="timer-action" type="button" onclick="pauseMeditationTimer()">一時停止</button>
      <button class="timer-action" type="button" onclick="resetMeditationTimer()">リセット</button>
    </div>
  </section>

  <section class="calendar" aria-label="達成カレンダー">
    <div class="calendar-header">
      <div>
        <div class="eyebrow">ACHIEVEMENT LOG</div>
        <div class="calendar-title" id="calendarTitle"></div>
      </div>
      <div class="month-nav">
        <button type="button" onclick="changeMonth(-1)" aria-label="前の月">‹</button>
        <button type="button" onclick="changeMonth(1)" aria-label="次の月">›</button>
      </div>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div class="calendar-note">全部できた日はカレンダーにチェックがつきます</div>
  </section>

  <div class="footer">日付が変わるとチェックは自動リセットされます</div>
</div>

<script>
const STORAGE_KEY = "habit_checker_items";
const DATE_KEY = "habit_checker_date";
const COMPLETED_DAYS_KEY = "habit_checker_completed_days";
const TIMER_MINUTES_KEY = "habit_checker_meditation_minutes";

let calendarDate = new Date();
let activeMeditationHabitId = null;
let timerInterval = null;
let timerTotalSeconds = 5 * 60;
let timerRemainingSeconds = timerTotalSeconds;
let timerRunning = false;

function pad(num) {
  return String(num).padStart(2, "0");
}

function dateStr(date) {
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
}

function todayStr() {
  return dateStr(new Date());
}

function loadCompletedDays() {
  return JSON.parse(localStorage.getItem(COMPLETED_DAYS_KEY) || "[]");
}

function saveCompletedDays(days) {
  localStorage.setItem(COMPLETED_DAYS_KEY, JSON.stringify([...new Set(days)].sort()));
}

function syncTodayCompletion(items) {
  const today = todayStr();
  const completedDays = loadCompletedDays();
  const isComplete = items.length > 0 && items.every(i => i.checked);
  const hasToday = completedDays.includes(today);

  if (isComplete && !hasToday) saveCompletedDays([...completedDays, today]);
  if (!isComplete && hasToday) saveCompletedDays(completedDays.filter(day => day !== today));
}

function loadData() {
  const savedDate = localStorage.getItem(DATE_KEY);
  const today = todayStr();
  let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

  if (savedDate !== today) {
    items = items.map(i => ({ ...i, checked: false }));
    localStorage.setItem(DATE_KEY, today);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  syncTodayCompletion(items);
  return items;
}

function saveData(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  syncTodayCompletion(items);
}

function addItem() {
  const input = document.getElementById("newItem");
  const text = input.value.trim();
  if (!text) return;

  const items = loadData();
  items.push({ id: Date.now(), text, checked: false });
  saveData(items);
  input.value = "";
  render();
}

function toggleItem(id) {
  const items = loadData().map(i => i.id === id ? { ...i, checked: !i.checked } : i);
  saveData(items);
  render();
}

function deleteItem(id) {
  const items = loadData().filter(i => i.id !== id);
  saveData(items);
  if (activeMeditationHabitId === id) closeMeditationTimer();
  render();
}

function isMeditationItem(item) {
  return item.text.includes("瞑想") || item.text.toLowerCase().includes("meditation");
}

function render() {
  const list = document.getElementById("list");
  const items = loadData();
  list.innerHTML = "";

  items.forEach(item => {
    const li = document.createElement("li");
    li.className = "item" + (item.checked ? " checked" : "");

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = item.checked;
    cb.onchange = () => toggleItem(item.id);

    const span = document.createElement("span");
    span.textContent = item.text;

    const del = document.createElement("button");
    del.textContent = "✕";
    del.className = "delete";
    del.onclick = () => deleteItem(item.id);
    del.setAttribute("aria-label", item.text + "を削除");

    const actions = document.createElement("div");
    actions.className = "item-actions";

    if (isMeditationItem(item)) {
      const timer = document.createElement("button");
      timer.type = "button";
      timer.textContent = "TIMER";
      timer.className = "timer-open";
      timer.onclick = () => openMeditationTimer(item.id);
      timer.setAttribute("aria-label", item.text + "のタイマーを開く");
      actions.appendChild(timer);
    }

    actions.appendChild(del);
    li.append(cb, span, actions);
    list.appendChild(li);
  });

  updateProgress(items);
  renderCalendar();
}

function openMeditationTimer(id) {
  const items = loadData();
  const item = items.find(i => i.id === id);
  if (!item) return;

  activeMeditationHabitId = id;
  document.getElementById("timerTarget").textContent = item.text;
  document.getElementById("meditationTimer").classList.add("active");

  const savedMinutes = Number(localStorage.getItem(TIMER_MINUTES_KEY) || 5);
  if (!timerRunning) setTimerMinutes(savedMinutes);
}

function closeMeditationTimer() {
  pauseMeditationTimer();
  activeMeditationHabitId = null;
  document.getElementById("meditationTimer").classList.remove("active");
}

function normalizeTimerMinutes(value) {
  const minutes = Number(value);
  if (!Number.isFinite(minutes)) return 5;
  return Math.min(120, Math.max(1, Math.round(minutes)));
}

function setTimerMinutes(minutes) {
  const normalized = normalizeTimerMinutes(minutes);
  localStorage.setItem(TIMER_MINUTES_KEY, String(normalized));
  document.getElementById("timerMinutes").value = normalized;
  timerTotalSeconds = normalized * 60;
  timerRemainingSeconds = timerTotalSeconds;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const minutes = Math.floor(timerRemainingSeconds / 60);
  const seconds = timerRemainingSeconds % 60;
  document.getElementById("timerDisplay").textContent = `${pad(minutes)}:${pad(seconds)}`;
}

function startMeditationTimer() {
  if (!activeMeditationHabitId) return;

  if (!timerRunning) {
    const minutes = normalizeTimerMinutes(document.getElementById("timerMinutes").value);
    if (timerRemainingSeconds <= 0 || timerRemainingSeconds === timerTotalSeconds) {
      setTimerMinutes(minutes);
    }
  }

  timerRunning = true;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerRemainingSeconds -= 1;
    updateTimerDisplay();

    if (timerRemainingSeconds <= 0) completeMeditationTimer();
  }, 1000);
}

function pauseMeditationTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
}

function resetMeditationTimer() {
  pauseMeditationTimer();
  setTimerMinutes(document.getElementById("timerMinutes").value);
}

function completeMeditationTimer() {
  pauseMeditationTimer();
  timerRemainingSeconds = 0;
  updateTimerDisplay();

  const items = loadData().map(item =>
    item.id === activeMeditationHabitId ? { ...item, checked: true } : item
  );
  saveData(items);
  render();
}

function updateProgress(items) {
  const bar = document.getElementById("progressBar");
  const status = document.getElementById("todayStatus");
  const progressText = document.getElementById("progressText");

  if (items.length === 0) {
    bar.style.width = "0%";
    progressText.textContent = "0%";
    status.textContent = "";
    return;
  }

  const done = items.filter(i => i.checked).length;
  const percent = Math.round((done / items.length) * 100);
  bar.style.width = percent + "%";
  progressText.textContent = percent + "%";
  status.textContent = done === items.length ? "今日の習慣を全部達成しました" : `${done}/${items.length} 達成`;
}

function changeMonth(offset) {
  calendarDate = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + offset, 1);
  renderCalendar();
}

function renderCalendar() {
  const grid = document.getElementById("calendarGrid");
  const title = document.getElementById("calendarTitle");
  const completedDays = loadCompletedDays();
  const year = calendarDate.getFullYear();
  const month = calendarDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDate = new Date(year, month + 1, 0).getDate();
  const today = todayStr();

  title.textContent = `${year}年${month + 1}月`;
  grid.innerHTML = "";

  ["日", "月", "火", "水", "木", "金", "土"].forEach(day => {
    const cell = document.createElement("div");
    cell.className = "weekday";
    cell.textContent = day;
    grid.appendChild(cell);
  });

  for (let i = 0; i < firstDay.getDay(); i++) {
    const empty = document.createElement("div");
    empty.className = "day empty";
    grid.appendChild(empty);
  }

  for (let day = 1; day <= lastDate; day++) {
    const current = dateStr(new Date(year, month, day));
    const cell = document.createElement("div");
    cell.className = "day";
    cell.textContent = day;

    if (completedDays.includes(current)) {
      cell.classList.add("completed");
      cell.setAttribute("aria-label", `${current} 達成`);
    }

    if (current === today) cell.classList.add("today");
    grid.appendChild(cell);
  }
}

document.getElementById("newItem").addEventListener("keydown", e => {
  if (e.key === "Enter") addItem();
});

document.getElementById("timerMinutes").addEventListener("change", e => {
  if (!timerRunning) setTimerMinutes(e.target.value);
});

if (!localStorage.getItem(DATE_KEY)) {
  localStorage.setItem(DATE_KEY, todayStr());
}

render();
</script>
</body>
</html>
