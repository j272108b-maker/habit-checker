<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>習慣チェッカー</title><style>:root{--line:#49c8ff;--text:#eaf7ff;--muted:#8aa9bf;--ok:#48f2a5}*{box-sizing:border-box}body{min-height:100vh;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 20% 0%,rgba(38,146,255,.35),transparent 34%),radial-gradient(circle at 88% 18%,rgba(59,225,255,.16),transparent 30%),linear-gradient(145deg,#040814 0%,#081b39 48%,#07111f 100%);display:flex;justify-content:center;padding:22px 10px}body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(73,200,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(73,200,255,.05) 1px,transparent 1px);background-size:28px 28px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.75),transparent 80%)}.app{position:relative;width:100%;max-width:520px;border:1px solid rgba(73,190,255,.38);border-radius:18px;background:linear-gradient(180deg,rgba(12,32,62,.94),rgba(5,13,27,.94));box-shadow:0 24px 70px rgba(0,0,0,.42),0 0 42px rgba(60,190,255,.18);padding:20px;overflow:hidden}.app:before,.app:after{content:"";position:absolute;width:74px;height:74px;border-color:var(--line);opacity:.48;pointer-events:none}.app:before{top:10px;left:10px;border-top:2px solid;border-left:2px solid}.app:after{right:10px;bottom:10px;border-right:2px solid;border-bottom:2px solid}.hud-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px}.eyebrow{color:var(--line);font-size:11px;font-weight:800;letter-spacing:0}h1{margin:5px 0 4px;font-size:26px;line-height:1.15}.subtitle{color:var(--muted);font-size:13px}.status-chip{flex:0 0 auto;min-width:76px;border:1px solid rgba(72,242,165,.48);border-radius:8px;padding:8px 10px;color:var(--ok);background:rgba(72,242,165,.08);text-align:center;font-size:11px;font-weight:800}.progress-wrap,.calendar,.meditation-timer{border:1px solid rgba(73,200,255,.28);border-radius:12px;background:rgba(1,9,22,.48)}.progress-wrap{padding:12px;margin-bottom:14px}.progress-meta{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px;color:var(--muted);font-size:12px;font-weight:700}.progress{height:10px;border-radius:999px;background:rgba(93,135,170,.22);overflow:hidden}.progress-bar{height:100%;width:0%;border-radius:inherit;background:linear-gradient(90deg,#2f7dff,#49c8ff,#48f2a5);box-shadow:0 0 18px rgba(73,200,255,.6);transition:width .3s}.today-status{min-height:20px;margin:10px 0 0;color:var(--ok);font-size:13px;font-weight:800}.input-row{display:grid;grid-template-columns:1fr auto;gap:8px;margin:16px 0}input[type=text],.minute-input{min-width:0;border-radius:8px;border:1px solid rgba(73,200,255,.3);background:rgba(2,11,26,.74);color:var(--text);outline:none}input[type=text]{padding:13px 14px;font-size:15px}input::placeholder{color:#69879e}input:focus{border-color:var(--line);box-shadow:0 0 0 3px rgba(73,200,255,.12)}button{border:none;border-radius:8px;cursor:pointer;font:inherit}.add-btn,.month-nav button{border:1px solid rgba(73,200,255,.5);background:linear-gradient(180deg,rgba(40,123,255,.95),rgba(16,67,150,.95));color:white;font-weight:800;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 0 18px rgba(31,140,255,.2)}.add-btn{padding:0 18px}ul{list-style:none;padding:0;margin:0}.item{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;min-height:56px;padding:12px;border:1px solid rgba(73,200,255,.22);border-radius:10px;margin-bottom:10px;background:rgba(10,27,54,.72)}.item.checked{border-color:rgba(72,242,165,.4);background:rgba(22,64,66,.72)}.item input{width:18px;height:18px;accent-color:var(--ok)}.item span{min-width:0;color:#f3fbff;font-size:15px;font-weight:700;overflow-wrap:anywhere}.item-actions{display:flex;align-items:center;gap:6px}.delete,.timer-close{width:34px;height:34px;color:#83a4b8;background:rgba(255,255,255,.03);font-size:16px}.timer-open{min-width:68px;height:34px;padding:0 10px;border:1px solid rgba(73,200,255,.48);color:var(--line);background:rgba(73,200,255,.08);font-size:11px;font-weight:900}.meditation-timer{display:none;margin-top:14px;padding:14px}.meditation-timer.active{display:block}.timer-head,.calendar-header{display:flex;justify-content:space-between;gap:10px;margin-bottom:12px}.timer-title,.calendar-title{color:#dff6ff;font-size:16px;font-weight:900}.timer-target,.timer-sound{color:var(--muted);font-size:12px}.timer-display{margin:12px 0;padding:16px 12px;border:1px solid rgba(72,242,165,.24);border-radius:10px;background:rgba(72,242,165,.06);color:var(--ok);text-align:center;font-size:38px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums}.timer-sound{margin:-3px 0 12px;text-align:center}.timer-settings{display:grid;grid-template-columns:repeat(3,minmax(0,1fr)) 76px;gap:8px;margin-bottom:10px}.timer-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.preset-btn,.timer-action{min-height:38px;border:1px solid rgba(73,200,255,.36);color:var(--text);background:rgba(73,200,255,.08);font-size:12px;font-weight:800}.timer-action.primary{border-color:rgba(72,242,165,.52);color:#052016;background:linear-gradient(180deg,rgba(72,242,165,.95),rgba(34,185,124,.95))}.minute-input{width:100%;padding:8px;font-size:13px;text-align:center}.calendar{margin-top:20px;padding:14px}.month-nav{display:flex;gap:6px}.month-nav button{width:34px;height:34px;padding:0;font-size:19px}.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}.weekday{color:var(--line);font-size:11px;font-weight:900;text-align:center}.day{position:relative;display:grid;place-items:center;aspect-ratio:1;border:1px solid rgba(73,200,255,.16);border-radius:7px;background:rgba(12,28,53,.72);color:#b9d3e5;font-size:13px;font-weight:800}.day.empty{border-color:transparent;background:transparent}.day.today{border-color:var(--line);color:#fff;box-shadow:0 0 14px rgba(73,200,255,.24)}.day.completed{border-color:rgba(72,242,165,.7);background:linear-gradient(180deg,rgba(72,242,165,.28),rgba(33,104,94,.7));color:white}.day.completed:after{content:"✓";position:absolute;right:4px;bottom:2px;color:var(--ok);font-size:12px;line-height:1}.day-percent{position:absolute;left:4px;bottom:2px;color:var(--muted);font-size:10px;font-weight:900;line-height:1}.day.completed .day-percent{display:none}.calendar-note,.footer{margin-top:12px;color:var(--muted);font-size:12px;text-align:center}.footer{color:#66859a}@media(max-width:380px){body{padding:12px 8px}.app{padding:16px}h1{font-size:23px}.input-row{grid-template-columns:1fr}.timer-settings,.timer-actions{grid-template-columns:repeat(2,minmax(0,1fr))}.minute-input{min-height:38px}.add-btn{min-height:44px}}</style></head><body><div class="app"><div class="hud-top"><div><div class="eyebrow">DAILY ROUTINE HUD</div><h1>習慣チェッカー</h1><div class="subtitle">静かに整える、今日の行動ログ</div></div><div class="status-chip">ONLINE</div></div><div class="progress-wrap"><div class="progress-meta"><span>MISSION PROGRESS</span><span id="progressText">0%</span></div><div class="progress"><div class="progress-bar" id="progressBar"></div></div><div class="today-status" id="todayStatus"></div></div><div class="input-row"><input id="newItem" type="text" placeholder="習慣を追加"><button class="add-btn" onclick="addItem()">追加</button></div><ul id="list"></ul><section class="meditation-timer" id="meditationTimer" aria-label="習慣タイマー"><div class="timer-head"><div><div class="eyebrow">FOCUS TIMER</div><div class="timer-title">習慣タイマー</div><div class="timer-target" id="timerTarget">対象の習慣</div></div><button class="timer-close" type="button" onclick="closeMeditationTimer()" aria-label="閉じる">✕</button></div><div class="timer-settings"><button class="preset-btn" type="button" onclick="setTimerMinutes(3)">3分</button><button class="preset-btn" type="button" onclick="setTimerMinutes(5)">5分</button><button class="preset-btn" type="button" onclick="setTimerMinutes(10)">10分</button><input class="minute-input" id="timerMinutes" type="number" min="1" max="120" value="5" aria-label="習慣時間（分）"></div><div class="timer-display" id="timerDisplay">05:00</div><div class="timer-sound" id="timerSound">自然音: 待機中</div><div class="timer-actions"><button class="timer-action primary" type="button" onclick="startMeditationTimer()">開始</button><button class="timer-action" type="button" onclick="pauseMeditationTimer()">一時停止</button><button class="timer-action" type="button" onclick="resetMeditationTimer()">リセット</button></div></section><section class="calendar" aria-label="達成カレンダー"><div class="calendar-header"><div><div class="eyebrow">ACHIEVEMENT LOG</div><div class="calendar-title" id="calendarTitle"></div></div><div class="month-nav"><button type="button" onclick="changeMonth(-1)" aria-label="前の月">‹</button><button type="button" onclick="changeMonth(1)" aria-label="次の月">›</button></div></div><div class="calendar-grid" id="calendarGrid"></div><div class="calendar-note">全部できた日はカレンダーにチェックがつきます</div></section><div class="footer">日付が変わるとチェックは自動リセットされます</div></div><script>const STORAGE_KEY="habit_checker_items",DATE_KEY="habit_checker_date",COMPLETED_DAYS_KEY="habit_checker_completed_days",DAY_PROGRESS_KEY="habit_checker_day_progress",TIMER_MINUTES_KEY="habit_checker_meditation_minutes";let calendarDate=new Date,activeMeditationHabitId=null,timerInterval=null,timerTotalSeconds=300,timerRemainingSeconds=300,timerRunning=false,timerEndAt=null,wakeLock=null,audioContext=null,riverNodes=[];function pad(n){return String(n).padStart(2,"0")}function dateStr(d){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function todayStr(){return dateStr(new Date)}function loadCompletedDays(){return JSON.parse(localStorage.getItem(COMPLETED_DAYS_KEY)||"[]")}function saveCompletedDays(d){localStorage.setItem(COMPLETED_DAYS_KEY,JSON.stringify([...new Set(d)].sort()))}function loadDayProgress(){return JSON.parse(localStorage.getItem(DAY_PROGRESS_KEY)||"{}")}function saveDayProgress(p){localStorage.setItem(DAY_PROGRESS_KEY,JSON.stringify(p))}function getCompletionPercent(items){return items.length===0?null:Math.round(items.filter(i=>i.checked).length/items.length*100)}function recordProgressForDate(date,items){if(!date)return;const percent=getCompletionPercent(items);if(percent===null)return;const progress=loadDayProgress();progress[date]=percent;saveDayProgress(progress);const done=loadCompletedDays(),has=done.includes(date);if(percent===100&&!has)saveCompletedDays([...done,date]);if(percent<100&&has)saveCompletedDays(done.filter(d=>d!==date))}function syncTodayCompletion(items){recordProgressForDate(todayStr(),items)}function loadData(){const saved=localStorage.getItem(DATE_KEY),today=todayStr();let items=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");if(saved!==today){recordProgressForDate(saved,items);items=items.map(i=>({...i,checked:false}));localStorage.setItem(DATE_KEY,today);localStorage.setItem(STORAGE_KEY,JSON.stringify(items))}syncTodayCompletion(items);return items}function saveData(items){localStorage.setItem(STORAGE_KEY,JSON.stringify(items));syncTodayCompletion(items)}function addItem(){const input=document.getElementById("newItem"),text=input.value.trim();if(!text)return;const items=loadData();items.push({id:Date.now(),text,checked:false});saveData(items);input.value="";render()}function toggleItem(id){saveData(loadData().map(i=>i.id===id?{...i,checked:!i.checked}:i));render()}function deleteItem(id){saveData(loadData().filter(i=>i.id!==id));if(activeMeditationHabitId===id)closeMeditationTimer();render()}function isTimedItem(item){const text=item.text.toLowerCase();return item.text.includes("瞑想")||item.text.includes("読書")||item.text.includes("Dラボ")||item.text.includes("ｄラボ")||item.text.includes("AI学習")||item.text.includes("ＡＩ学習")||text.includes("meditation")||text.includes("reading")||text.includes("dラボ")||text.includes("d-lab")||text.includes("ai学習")||text.includes("ai 学習")}function render(){const list=document.getElementById("list"),items=loadData();list.innerHTML="";items.forEach(item=>{const li=document.createElement("li");li.className="item"+(item.checked?" checked":"");const cb=document.createElement("input");cb.type="checkbox";cb.checked=item.checked;cb.onchange=()=>toggleItem(item.id);const span=document.createElement("span");span.textContent=item.text;const del=document.createElement("button");del.textContent="✕";del.className="delete";del.onclick=()=>deleteItem(item.id);del.setAttribute("aria-label",item.text+"を削除");const actions=document.createElement("div");actions.className="item-actions";if(isTimedItem(item)){const timer=document.createElement("button");timer.type="button";timer.textContent="TIMER";timer.className="timer-open";timer.onclick=()=>openMeditationTimer(item.id);timer.setAttribute("aria-label",item.text+"のタイマーを開く");actions.appendChild(timer)}actions.appendChild(del);li.append(cb,span,actions);list.appendChild(li)});updateProgress(items);renderCalendar()}function openMeditationTimer(id){const item=loadData().find(i=>i.id===id);if(!item)return;activeMeditationHabitId=id;document.getElementById("timerTarget").textContent=item.text;document.getElementById("meditationTimer").classList.add("active");const saved=Number(localStorage.getItem(TIMER_MINUTES_KEY)||5);if(!timerRunning)setTimerMinutes(saved)}function closeMeditationTimer(){pauseMeditationTimer();activeMeditationHabitId=null;document.getElementById("meditationTimer").classList.remove("active")}function normalizeTimerMinutes(v){const m=Number(v);return Number.isFinite(m)?Math.min(120,Math.max(1,Math.round(m))):5}function setTimerMinutes(m){const n=normalizeTimerMinutes(m);localStorage.setItem(TIMER_MINUTES_KEY,String(n));document.getElementById("timerMinutes").value=n;timerTotalSeconds=n*60;timerRemainingSeconds=timerTotalSeconds;updateTimerDisplay()}function updateTimerDisplay(){document.getElementById("timerDisplay").textContent=`${pad(Math.floor(timerRemainingSeconds/60))}:${pad(timerRemainingSeconds%60)}`}async function requestWakeLock(){if(!("wakeLock" in navigator)||wakeLock)return;try{wakeLock=await navigator.wakeLock.request("screen");wakeLock.addEventListener("release",()=>{wakeLock=null})}catch(e){wakeLock=null}}function releaseWakeLock(){if(!wakeLock)return;wakeLock.release();wakeLock=null}function updateTimerFromClock(){if(!timerEndAt)return;timerRemainingSeconds=Math.max(0,Math.ceil((timerEndAt-Date.now())/1e3));updateTimerDisplay();if(timerRemainingSeconds<=0)completeMeditationTimer()}function getAudioContext(){if(!audioContext){const C=window.AudioContext||window.webkitAudioContext;if(!C)return null;audioContext=new C}if(audioContext.state==="suspended")audioContext.resume();return audioContext}function createNoiseBuffer(ctx,seconds){const sr=ctx.sampleRate,b=ctx.createBuffer(1,sr*seconds,sr),data=b.getChannelData(0);let last=0;for(let i=0;i<data.length;i++){last=(last+(Math.random()*2-1)*.05)*.985;data[i]=last}return b}function startRiverSound(){const ctx=getAudioContext();if(!ctx||riverNodes.length>0)return;const g=ctx.createGain();g.gain.setValueAtTime(.001,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.12,ctx.currentTime+1.2);g.connect(ctx.destination);const low=ctx.createBufferSource(),lowFilter=ctx.createBiquadFilter(),high=ctx.createBufferSource(),highFilter=ctx.createBiquadFilter(),lfo=ctx.createOscillator(),lfoGain=ctx.createGain();low.buffer=createNoiseBuffer(ctx,3);low.loop=true;lowFilter.type="lowpass";lowFilter.frequency.value=760;lowFilter.Q.value=.8;high.buffer=createNoiseBuffer(ctx,2);high.loop=true;highFilter.type="bandpass";highFilter.frequency.value=1800;highFilter.Q.value=.7;lfo.frequency.value=.18;lfoGain.gain.value=.025;lfo.connect(lfoGain);lfoGain.connect(g.gain);low.connect(lowFilter).connect(g);high.connect(highFilter).connect(g);low.start();high.start();lfo.start();riverNodes=[low,high,lfo,g];document.getElementById("timerSound").textContent="自然音: 川のせせらぎ"}function stopRiverSound(){if(!audioContext||riverNodes.length===0)return;const now=audioContext.currentTime,g=riverNodes[3];g.gain.cancelScheduledValues(now);g.gain.setValueAtTime(Math.max(g.gain.value,.001),now);g.gain.exponentialRampToValueAtTime(.001,now+.45);riverNodes.slice(0,3).forEach(n=>{try{n.stop(now+.5)}catch(e){}});riverNodes=[];document.getElementById("timerSound").textContent="自然音: 停止中"}function playBellSound(){const ctx=getAudioContext();if(!ctx)return;const now=ctx.currentTime,out=ctx.createGain();out.gain.setValueAtTime(.001,now);out.gain.exponentialRampToValueAtTime(.18,now+.02);out.gain.exponentialRampToValueAtTime(.001,now+2.8);out.connect(ctx.destination);[880,1320,1760].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type="sine";o.frequency.setValueAtTime(f,now);o.frequency.exponentialRampToValueAtTime(f*.992,now+2.6);g.gain.setValueAtTime(1/(i+1.15),now);g.gain.exponentialRampToValueAtTime(.001,now+2.6);o.connect(g).connect(out);o.start(now);o.stop(now+2.9)});document.getElementById("timerSound").textContent="完了音: チリーン"}function startMeditationTimer(){if(!activeMeditationHabitId)return;if(!timerRunning){const m=normalizeTimerMinutes(document.getElementById("timerMinutes").value);if(timerRemainingSeconds<=0||timerRemainingSeconds===timerTotalSeconds)setTimerMinutes(m)}timerEndAt=Date.now()+timerRemainingSeconds*1e3;requestWakeLock();startRiverSound();timerRunning=true;clearInterval(timerInterval);timerInterval=setInterval(()=>updateTimerFromClock(),1e3)}function pauseMeditationTimer(){if(timerRunning)updateTimerFromClock();timerRunning=false;timerEndAt=null;clearInterval(timerInterval);stopRiverSound();releaseWakeLock()}function resetMeditationTimer(){pauseMeditationTimer();setTimerMinutes(document.getElementById("timerMinutes").value)}function completeMeditationTimer(){timerRunning=false;timerEndAt=null;clearInterval(timerInterval);stopRiverSound();releaseWakeLock();timerRemainingSeconds=0;updateTimerDisplay();playBellSound();saveData(loadData().map(item=>item.id===activeMeditationHabitId?{...item,checked:true}:item));render()}function updateProgress(items){const bar=document.getElementById("progressBar"),status=document.getElementById("todayStatus"),text=document.getElementById("progressText");if(items.length===0){bar.style.width="0%";text.textContent="0%";status.textContent="";return}const done=items.filter(i=>i.checked).length,p=Math.round(done/items.length*100);bar.style.width=p+"%";text.textContent=p+"%";status.textContent=done===items.length?"今日の習慣を全部達成しました":`${done}/${items.length} 達成`}function changeMonth(offset){calendarDate=new Date(calendarDate.getFullYear(),calendarDate.getMonth()+offset,1);renderCalendar()}function renderCalendar(){const grid=document.getElementById("calendarGrid"),title=document.getElementById("calendarTitle"),done=loadCompletedDays(),progress=loadDayProgress(),y=calendarDate.getFullYear(),m=calendarDate.getMonth(),first=new Date(y,m,1),last=new Date(y,m+1,0).getDate(),today=todayStr();title.textContent=`${y}年${m+1}月`;grid.innerHTML="";["日","月","火","水","木","金","土"].forEach(w=>{const c=document.createElement("div");c.className="weekday";c.textContent=w;grid.appendChild(c)});for(let i=0;i<first.getDay();i++){const c=document.createElement("div");c.className="day empty";grid.appendChild(c)}for(let d=1;d<=last;d++){const current=dateStr(new Date(y,m,d)),c=document.createElement("div"),percent=progress[current];c.className="day";c.textContent=d;if(done.includes(current)||percent===100){c.classList.add("completed");c.setAttribute("aria-label",`${current} 達成`)}else if(typeof percent==="number"){const p=document.createElement("span");p.className="day-percent";p.textContent=`${percent}%`;c.appendChild(p);c.setAttribute("aria-label",`${current} ${percent}% 達成`)}if(current===today)c.classList.add("today");grid.appendChild(c)}}document.getElementById("newItem").addEventListener("keydown",e=>{if(e.key==="Enter")addItem()});document.getElementById("timerMinutes").addEventListener("change",e=>{if(!timerRunning)setTimerMinutes(e.target.value)});document.addEventListener("visibilitychange",()=>{if(!timerRunning)return;updateTimerFromClock();if(document.visibilityState==="visible")requestWakeLock()});if(!localStorage.getItem(DATE_KEY))localStorage.setItem(DATE_KEY,todayStr());render();</script></body></html>
